<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <title>Concierge - H.O.P. System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/concierge.css">
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
</head>

<body>
    <div class="container-fluid px-4 mt-3">
        <div class="d-flex justify-content-between align-items-center border-bottom border-secondary pb-2 mb-4">
            <h4 class="mb-0 d-flex align-items-center" style="letter-spacing: 3px;">
                <img src="images/logo-hop.png" alt="Logo" style="height: 40px; margin-right: 15px; border-radius: 5px;">
                H.O.P. CONCIERGE
            </h4>
            <div class="d-flex gap-2">
                <button class="btn btn-warning btn-sm px-3 fw-bold" onclick="openManualModal()">+ INSERIMENTO
                    MANUALE</button>
                <a href="deposit.html" class="btn btn-outline-light btn-sm px-3 fw-bold"
                    style="border: 1px solid #c5a059; color: #c5a059;">DEPOSITO</a>
                <a href="Archivio.html" class="btn btn-outline-warning btn-sm px-3">ARCHIVIO</a>
            </div>
        </div>
        <div id="luggage-list" class="d-flex flex-wrap gap-4"></div>

        <div id="thermal-print-area">
            <div style="text-align:center;"><b>HOP - Rome Cavalieri</b></div>
            <div id="print-content" style="text-align:center;"></div>
            <div id="tag-id-display"
                style="text-align:center; font-size: 20pt; font-weight: bold; border: 2px solid black; margin: 5px 0;">
            </div>
            <div style="text-align:center;"><svg id="barcode-svg"></svg></div>
            <div id="print-footer" style="text-align:center; font-size: 8pt; border-top: 1px dashed black;"></div>
        </div>

        <div class="delivery-section minimized" id="deliveryPanel">
            <button class="toggle-delivery-btn" onclick="toggleDeliveryPanel()">
                <i id="toggleIcon" class="fas fa-chevron-up me-2"></i>CONSEGNE
            </button>
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h6 class="text-success m-0">CONSEGNE DEL GIORNO</h6>
                <input type="text" id="searchDeliveries" class="form-control form-control-sm bg-dark text-white w-25"
                    placeholder="Filtra..." onkeyup="renderAll()">
            </div>
            <div style="height: 280px; overflow-y: auto;">
                <table class="main-table table table-dark table-sm">
                    <thead>
                        <tr>
                            <th>ORA</th>
                            <th>TAG</th>
                            <th>GUEST</th>
                            <th>ROOM</th>
                            <th>PCS</th>
                            <th>PORTER / STATO</th>
                        </tr>
                    </thead>
                    <tbody id="today-deliveries-body"></tbody>
                </table>
            </div>
        </div>

        <div class="bottom-nav-bar">
            <a href="hub.html" class="nav-btn-gold">HOME PAGE</a>
            <a href="Porter.html" class="nav-btn-gold mx-3"
                style="border-radius: 50%; padding: 0; width: 40px; height: 40px; justify-content: center;"
                title="Porter Mode"><i class="fas fa-walking"></i></a>
            <div id="live-clock" class="text-gold"></div>
        </div>


    </div>

    <div class="modal fade" id="manualEntryModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content modal-content-luxury p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h5 class="text-warning m-0 fw-bold">DELIVERY DETAILS</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="mb-3">
                    <label>NOME OSPITE</label>
                    <input type="text" id="mName" class="form-control luxury-input text-start">
                </div>
                <div class="row mb-3">
                    <div class="col-6">
                        <label>CAMERA</label>
                        <input type="text" id="mRoom" class="form-control luxury-input">
                    </div>
                    <div class="col-6">
                        <label>PEZZI (PCS)</label>
                        <input type="number" id="mPcs" class="form-control luxury-input" value="1">
                    </div>
                </div>
                <div class="mb-4">
                    <label>TIPOLOGIA</label>
                    <select id="mDelivery" class="form-select luxury-input text-start">
                        <option value="CHECK IN">CHECK IN</option>
                        <option value="CHECK OUT">CHECK OUT</option>
                        <option value="ROOM MOVE">ROOM MOVE</option>
                        <option value="LETTER/MSG">LETTER/MSG</option>
                        <option value="BOX/PACKAGE">BOX/PACKAGE</option>
                    </select>
                </div>
                <div class="d-flex gap-2">
                    <button class="btn btn-outline-danger w-50 fw-bold" data-bs-dismiss="modal">ANNULLA</button>
                    <button class="btn btn-warning w-50 fw-bold" onclick="saveManual()">SALVA TICKET</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/custom-ui.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Variables from app.js are available (API_URL, etc)

        // Sound & Notification Context
        let audioCtx;
        const seenTickets = new Set();

        // Initialize Audio & Notifications on first user interaction
        document.addEventListener('click', () => {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();

            if (Notification.permission !== 'granted' && Notification.permission !== 'denied') {
                Notification.requestPermission();
            }
        }, { once: true });

        function playSound(type) {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const output = audioCtx.createGain();
            output.connect(audioCtx.destination);

            const now = audioCtx.currentTime;

            if (type === 'new') {
                // "Bip" - Short High Sine Wave
                const osc = audioCtx.createOscillator();
                osc.type = 'sine';
                osc.connect(output);
                osc.frequency.setValueAtTime(800, now);
                osc.frequency.exponentialRampToValueAtTime(400, now + 0.15);

                output.gain.setValueAtTime(0.3, now);
                output.gain.exponentialRampToValueAtTime(0.01, now + 0.15);

                osc.start(now);
                osc.stop(now + 0.2);
            }
            else if (type === 'success') {
                // "Chime" - Ascending Major Triad
                const notes = [523.25, 659.25, 783.99]; // C5, E5, G5
                notes.forEach((freq, i) => {
                    const osc = audioCtx.createOscillator();
                    osc.type = 'triangle';
                    osc.connect(output);
                    osc.frequency.value = freq;

                    const startTime = now + (i * 0.1);
                    output.gain.setValueAtTime(0, startTime);
                    output.gain.linearRampToValueAtTime(0.2, startTime + 0.05);
                    output.gain.exponentialRampToValueAtTime(0.001, startTime + 0.4);

                    osc.start(startTime);
                    osc.stop(startTime + 0.5);
                });
            }
        }

        function sendNotification(title, body) {
            if (Notification.permission === 'granted') {
                new Notification(title, { body: body, icon: 'images/logo-hop.png' });
            }
        }

        function toggleDeliveryPanel() {
            const panel = document.getElementById('deliveryPanel');
            const icon = document.getElementById('toggleIcon');
            const isMinimized = panel.classList.toggle('minimized');

            icon.className = isMinimized ? 'fas fa-chevron-up me-2' : 'fas fa-chevron-down me-2';
            document.body.style.paddingBottom = isMinimized ? '120px' : '500px';
        }

        function openManualModal() {
            new bootstrap.Modal(document.getElementById('manualEntryModal')).show();
        }

        async function saveManual() {
            const barcode = Math.floor(100000 + Math.random() * 900000).toString();
            const data = {
                barcode: barcode,
                guest: document.getElementById('mName').value.toUpperCase(),
                room: document.getElementById('mRoom').value,
                pcs: document.getElementById('mPcs').value,
                type: document.getElementById('mDelivery').value,
                status: 'PENDING',
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                start: Date.now()
            };
            if (!data.guest || !data.room) { await showCustomAlert("Dati mancanti!"); return; }

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (!response.ok) {
                    const errText = await response.text();
                    throw new Error(errText || "Errore del server");
                }

                bootstrap.Modal.getInstance(document.getElementById('manualEntryModal')).hide();
                renderAll();
            } catch (e) {
                await showCustomAlert("Errore durante il salvataggio: " + e.message);
                console.error(e);
            }
        }

        async function renderAll() {
            try {
                const resL = await fetch(API_URL);
                const tickets = await resL.json();

                // Check for new tickets
                if (seenTickets.size > 0) {
                    let hasNew = false;
                    tickets.forEach(t => {
                        if (!seenTickets.has(t._id)) {
                            hasNew = true;
                            sendNotification("NUOVO TICKET", `Camera ${t.room} - ${t.guest}`);
                        }
                    });
                    if (hasNew) playSound('new');
                }

                // Update seen set
                seenTickets.clear();
                tickets.forEach(t => seenTickets.add(t._id));

                document.getElementById('luggage-list').innerHTML = tickets.map(t => {
                    const isWorking = t.status === 'DELIVERING';
                    return `
                <div class="luggage-card ${isWorking ? 'card-delivering' : ''}">
                    <div class="status-led ${isWorking ? 'led-yellow-blink' : 'led-red'}"></div>
                    <div>
                        <div class="room-tag">R. ${t.room}</div>
                        <span class="guest-name">${t.guest}</span>
                        <div class="mt-2"><span class="type-label">${t.type || 'LUGGAGE'}</span></div>
                        <small class="text-warning d-block">Pezzi: ${t.pcs}</small>
                        <small class="text-white opacity-50" style="font-size:0.9rem; font-weight:bold;">TAG: #${t.barcode || 'N/A'}</small>
                    </div>
                    <div class="btn-group-custom">
                        <button class="btn-c ${isWorking ? 'btn-active' : ''}" onclick="toggleStatus('${t._id}', '${t.status}', '${t.guest}', '${t.room}', '${t.pcs}', '${t.barcode}')">${isWorking ? 'In Corso' : 'In Consegna'}</button>
                        <button class="btn-c" onclick="completeDelivery('${t._id}', '${t.guest}', '${t.room}', '${t.pcs}', ${t.start}, '${t.type}', '${t.barcode}')">Consegnato</button>
                        <button class="btn-c btn-annulla" onclick="cancelWithPorter('${t._id}', '${t.guest}', '${t.room}', '${t.pcs}')">Annulla</button>
                    </div>
                </div>`}).join('');

                const today = new Date().toISOString().split('T')[0];
                const resA = await fetch(`${ARCHIVE_URL}?date=${today}`);
                const hist = await resA.json();
                document.getElementById('today-deliveries-body').innerHTML = hist.reverse().map(i => `<tr><td>${i.time}</td><td><span class="text-warning fw-bold">${i.barcode || '-'}</span></td><td>${i.guest}</td><td>${i.room}</td><td>${i.pcs}</td><td>${i.user} (${i.durata || ''})</td></tr>`).join('');
            } catch (e) { }
        }

        async function toggleStatus(id, currentStatus, guest, room, pcs, barcode) {
            const nextStatus = currentStatus === 'DELIVERING' ? 'PENDING' : 'DELIVERING';
            if (nextStatus === 'DELIVERING') doPrint(barcode, room, guest, pcs);
            await fetch(`${API_URL}/${id}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ status: nextStatus }) });
            renderAll();
        }

        function doPrint(tagId, room, guest, pcs) {
            if (!tagId || tagId === 'undefined') return;
            document.getElementById('print-content').innerHTML = `<div style="font-size: 14pt; font-weight: bold;">ROOM: ${room}</div><div style="font-size: 10pt;">${guest}</div><div style="font-size: 9pt;">Pezzi: ${pcs}</div>`;
            document.getElementById('tag-id-display').innerText = tagId;
            JsBarcode("#barcode-svg", tagId.toString(), { format: "CODE128", width: 1.5, height: 40, displayValue: false, margin: 0 });
            setTimeout(() => { window.print(); }, 400);
        }

        async function completeDelivery(id, guest, room, pcs, start, type, barcode) {
            const pin = await showCustomPrompt("PIN Porter:", true);
            if (!pin) return;
            // Updated to use server-side login check
            try {
                const resLog = await fetch('/api/users/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pin })
                });
                const authData = await resLog.json();

                if (authData.success) {
                    const user = authData.user;
                    const diff = Math.round((Date.now() - (start || Date.now())) / 60000);
                    const data = { barcode, guest, room, pcs, type, status: 'COMPLETED', user: user ? `${user.nome} ${user.cognome}` : "Admin", durata: diff + " min", time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }), deliveryDate: new Date().toISOString().split('T')[0] };
                    await fetch(ARCHIVE_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
                    await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                    playSound('success');
                    renderAll();
                } else {
                    await showCustomAlert("PIN Non Valido");
                }
            } catch (e) { await showCustomAlert("Errore connessione"); }
        }

        async function cancelWithPorter(id, guest, room, pcs) {
            if (!await showCustomConfirm("Annullare il ticket?")) return;
            const code = await showCustomPrompt("PIN Porter per annullamento:", true);
            if (!code) return;

            try {
                const resLog = await fetch('/api/users/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pin: code })
                });
                const authData = await resLog.json();

                if (authData.success) {
                    const user = authData.user;
                    const porterName = user ? `${user.nome} ${user.cognome}` : "Admin";
                    const data = { guest, room, pcs, status: 'CANCELLED', user: `CANCELLED BY ${porterName}`, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }), deliveryDate: new Date().toISOString().split('T')[0] };
                    await fetch(ARCHIVE_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
                    await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                    playSound('success');
                    renderAll();
                } else {
                    await showCustomAlert("PIN Non Valido");
                }
            } catch (e) { await showCustomAlert("Errore connessione"); }
        }

        setInterval(renderAll, 5000);
        setInterval(() => updateClock('live-clock'), 1000);
        updateClock('live-clock');
        renderAll();
    </script>
</body>

</html>
