<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <title>HOP - Rome Cavalieri</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Local specific styles for Landing Page */
        #page-hub {
            background: linear-gradient(rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.2)), url('images/home page.jpg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: flex-end;
            padding: 0 40px 120px 40px;
        }

        .btn-discrete {
            background: rgba(0, 0, 0, 0.7);
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 15px 60px;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: 0.3s;
            cursor: pointer;
            font-size: 1.1rem;
            backdrop-filter: blur(5px);
        }

        .btn-discrete:hover {
            background: var(--gold);
            color: #000;
            box-shadow: 0 0 20px rgba(197, 160, 89, 0.4);
        }

        .info-footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.95);
            border-top: 1px solid var(--gold);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            font-size: 0.85rem;
        }

        .footer-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .btn-users-text {
            background: none;
            border: none;
            color: var(--gold);
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            padding: 0;
            font-size: 0.75rem;
        }

        .btn-users-text:hover {
            color: white;
            text-shadow: 0 0 8px var(--gold);
        }

        .modal-content {
            background: #111;
            border: 1px solid var(--gold);
            color: white;
            border-radius: 0;
        }

        .form-control {
            background: #1a1a1a;
            border: 1px solid #333;
            color: var(--gold);
            text-align: center;
            font-size: 1.5rem;
            letter-spacing: 5px;
            border-radius: 0;
        }

        .gold-text {
            color: var(--gold);
        }

        .btn-login {
            border-radius: 0;
            border: 1px solid var(--gold);
            color: var(--gold);
            transition: 0.3s;
        }

        .btn-login:hover {
            background: var(--gold);
            color: black;
        }
    </style>
</head>

<body>

    <div id="page-hub">
        <div class="d-flex justify-content-between w-100">
            <button class="btn-discrete" onclick="openLogin('Reception')">Reception</button>
            <button class="btn-discrete" onclick="openLogin('Concierge')">Concierge</button>
        </div>
    </div>

    <!-- Login Modal -->
    <div class="modal fade" id="loginModal" tabindex="-1">
        <div class="modal-dialog modal-sm modal-dialog-centered">
            <div class="modal-content p-4 shadow-lg">
                <h5 id="loginTitle" class="gold-text mb-4 text-center" style="letter-spacing: 2px;">LOGIN</h5>
                <input type="password" id="loginCode" class="form-control mb-4" maxlength="4" placeholder="****"
                    autocomplete="off">
                <button class="btn btn-login w-100" onclick="verifyLogin()">ENTRA</button>
            </div>
        </div>
    </div>

    <!-- Custom Error Toast -->
    <div id="error-toast"
        style="position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(20, 0, 0, 0.95); border: 1px solid #ff4444; color: #ff4444; padding: 15px 30px; border-radius: 4px; letter-spacing: 1px; font-weight: bold; display: none; z-index: 2000; box-shadow: 0 5px 20px rgba(0,0,0,0.5);">
        ACCESS DENIED
    </div>

    <div class="info-footer">
        <div class="footer-left">
            <div>
                <span class="gold-text fw-bold">HOP SYSTEM</span>
                <span class="text-white-50 ms-2">| ROME CAVALIERI</span>
            </div>
            <button class="btn-users-text" onclick="checkAdminAccess()">USERS</button>
        </div>
        <div id="live-clock" class="gold-text"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Session Check
        if (!sessionStorage.getItem('hop_authenticated')) {
            window.location.href = "index.html";
        }

        let targetReparto = '';
        const loginModal = new bootstrap.Modal(document.getElementById('loginModal'));

        function openLogin(reparto) {
            targetReparto = reparto;
            document.getElementById('loginTitle').innerText = "ACCESSO " + reparto.toUpperCase();
            document.getElementById('loginCode').value = '';
            loginModal.show();
            setTimeout(() => document.getElementById('loginCode').focus(), 500);
        }

        function verifyLogin() {
            const code = document.getElementById('loginCode').value;
            let isValid = false;

            if (code === "2251") {
                isValid = true;
            } else if (targetReparto === 'Reception' && code === "2030") {
                isValid = true;
            } else if (targetReparto === 'Concierge' && code === "2040") {
                isValid = true;
            }

            if (isValid) {
                if (targetReparto === 'Reception') window.location.href = "reception.html";
                else if (targetReparto === 'Concierge') window.location.href = "Concierge.html";
            } else {
                showError("CODICE ERRATO");
                document.getElementById('loginCode').value = '';
                document.getElementById('loginCode').focus();
            }
        }

        function checkAdminAccess() {
            // Using a simple prompt replacement or custom modal for admin would be better, 
            // but for now reusing the logic with a quick specialized prompt 
            // or re-using the modal? 
            // Let's use a simple prompt but handle the error nicely, or better yet, reuse the modal logic?
            // For simplicity and to match requests, let's just piggyback on the modal or use a custom overlay.
            // But to keep it simple as user asked for "line with style of app":

            // Re-using the modal for Admin
            targetReparto = 'Admin';
            document.getElementById('loginTitle').innerText = "ACCESSO ADMIN";
            document.getElementById('loginCode').value = '';
            loginModal.show();
            setTimeout(() => document.getElementById('loginCode').focus(), 500);
        }

        // Overriding verifyLogin for Admin case
        const originalVerify = verifyLogin;
        verifyLogin = function () {
            if (targetReparto === 'Admin') {
                const code = document.getElementById('loginCode').value;
                if (code === "2251") {
                    window.location.href = "users.html";
                } else {
                    showError("ACCESSO NEGATO");
                    document.getElementById('loginCode').value = '';
                }
            } else {
                originalVerify();
            }
        }

        function showError(msg) {
            const toast = document.getElementById('error-toast');
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        document.getElementById('loginCode').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') verifyLogin();
        });

        setInterval(() => updateClock('live-clock'), 1000);
        updateClock('live-clock');
    </script>
</body>


</html>
