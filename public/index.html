<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <title>Login - Rome Cavalieri</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.8)), url('images/home page.jpg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            font-family: 'Times New Roman', serif;
        }

        .login-card {
            background: rgba(10, 10, 10, 0.9);
            border: 2px solid var(--gold);
            padding: 40px;
            text-align: center;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
        }

        .logo-img {
            max-width: 120px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 5px var(--gold));
        }

        h2 {
            color: var(--gold);
            letter-spacing: 5px;
            font-size: 1.5rem;
            margin-bottom: 30px;
            font-weight: 300;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #444;
            color: var(--gold);
            text-align: center;
            letter-spacing: 3px;
            font-size: 1.2rem;
            padding: 10px;
            border-radius: 0;
            transition: 0.3s;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--gold);
            box-shadow: 0 0 10px rgba(197, 160, 89, 0.3);
            color: white;
        }

        .btn-enter {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            letter-spacing: 3px;
            padding: 10px 40px;
            margin-top: 20px;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .btn-enter:hover {
            background: var(--gold);
            color: black;
            box-shadow: 0 0 15px rgba(197, 160, 89, 0.5);
        }

        /* Custom Error Toast */
        #error-toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 0, 0, 0.95);
            border: 1px solid #ff4444;
            color: #ff4444;
            padding: 15px 30px;
            border-radius: 4px;
            letter-spacing: 1px;
            font-weight: bold;
            display: none;
            z-index: 2000;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>

<body>

    <div class="login-card">
        <img src="images/logo-hop.png" alt="Logo" class="logo-img">
        <h2>ROME CAVALIERI</h2>
        <input type="password" id="globalPass" class="form-control" placeholder="PASSWORD" autofocus>
        <button class="btn-enter" onclick="checkGlobal()">ENTRA</button>
    </div>

    <div id="error-toast">ACCESS DENIED</div>

    <script>
        const GLOBAL_PASS = "Cavalieri26!";

        function checkGlobal() {
            const input = document.getElementById('globalPass');
            if (input.value === GLOBAL_PASS) {
                sessionStorage.setItem('hop_authenticated', 'true');
                window.location.href = "hub.html";
            } else {
                showError("PASSWORD ERRATA");
                input.value = "";
                input.focus();
            }
        }

        function showError(msg) {
            const toast = document.getElementById('error-toast');
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        document.getElementById('globalPass').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkGlobal();
        });
    </script>

</body>

</html>
